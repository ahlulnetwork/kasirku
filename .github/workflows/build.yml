name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Verify better-sqlite3 exists
        run: |
          if (Test-Path "node_modules/better-sqlite3/build/Release/better_sqlite3.node") {
            Write-Host "better-sqlite3 native module found"
          } else {
            Write-Host "ERROR: better-sqlite3 native module NOT found"
            exit 1
          }
        shell: pwsh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build label_printer.exe
        run: |
          pip install pyinstaller
          cd python
          pyinstaller --onefile --noconsole --name label_printer label_printer.py
        shell: pwsh

      - name: Build Vue app
        run: npm run build

      - name: Obfuscate Electron code
        run: npm run obfuscate

      - name: Build Electron installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KasirKu-Windows-Installer
          path: dist-electron/*.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist-electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
